<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Us | Chamber of Commerce</title>
    <script src="script/script.js" defer></script>
    <link rel="stylesheet" href="styles/styles.css">
    <link rel="icon" href="images/favicon.ico" type="image/x-icon">
</head>
<body>
    <header>
        <h1>Chamber of Commerce</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="directory.html">Directory</a>
            <a href="discover.html">Discover</a>
            <a href="join.html">Join</a>
        </nav>
    </header>

    <main class="container">
        <h2>Become a Member</h2>
        <form>
            <label for="business-name">Business Name:</label>
            <input type="text" id="business-name" name="business-name" required>

            <label for="contact-name">Contact Name:</label>
            <input type="text" id="contact-name" name="contact-name" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label for="membership-level">Membership Level:</label>
            <select id="membership-level" name="membership-level">
                <option value="1">Member</option>
                <option value="2">Silver</option>
                <option value="3">Gold</option>
            </select>

            <button type="submit">Join Now</button>
        </form>
    </main>

    <footer>
        <p>&copy; <span id="year"></span> Chamber of Commerce | Jonas Crothers | WDD 231</p>
        <p>Last Updated: <span id="lastModified"></span></p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
